<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Havril</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #09090b;
      --surface: #18181b;
      --border:  #27272a;
      --muted:   #52525b;
      --subtle:  #a1a1aa;
      --text:    #f4f4f5;
      --accent:  #e4e4e7;
      --green:   #4ade80;
      --red:     #f87171;
      --amber:   #e8a040;
      --radius:  8px;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo { width: 28px; height: 28px; }
    .logo img { width: 100%; height: 100%; object-fit: contain; }

    h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
    h1 span { color: var(--amber); }

    /* ── Login view ── */
    #view-login { display: flex; flex-direction: column; gap: 10px; }

    .oauth-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }
    .oauth-btn:hover { border-color: var(--subtle); background: #27272a; }
    .oauth-btn svg { flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 11px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .advanced-toggle {
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      text-align: left;
      padding: 0;
      letter-spacing: 0.04em;
    }
    .advanced-toggle:hover { color: var(--subtle); }

    #advanced { display: none; flex-direction: column; gap: 6px; }
    #advanced.open { display: flex; }

    label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }
    input:focus { border-color: var(--subtle); }
    input::placeholder { color: var(--muted); }

    /* ── Connected view ── */
    #view-connected { display: none; flex-direction: column; gap: 14px; }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 500; truncate: ellipsis; }
    .user-email { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--subtle);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 600; display: block; margin-bottom: 2px; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .platforms { display: flex; flex-direction: column; gap: 6px; }
    .platform {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
    }
    .platform-name { color: var(--text); }
    .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
    .badge-active { background: rgba(74,222,128,0.1); color: var(--green); }

    .btn-logout {
      width: 100%;
      padding: 8px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .btn-logout:hover { color: var(--red); border-color: var(--red); }

    /* ── Connecting overlay ── */
    #view-connecting {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px 0;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #msg {
      font-size: 11px;
      text-align: center;
      min-height: 14px;
      color: var(--muted);
      margin-top: 4px;
    }
    #msg.error { color: var(--red); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="../icons/icon48.png" alt="Havril" />
  </div>
  <h1>Hav<span>ril</span></h1>
</header>

<!-- Login view -->
<div id="view-login">
  <button class="oauth-btn" id="btn-google">
    <svg width="16" height="16" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <button class="oauth-btn" id="btn-github">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--text)">
      <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
    </svg>
    Continue with GitHub
  </button>

  <div class="divider">advanced</div>

  <button class="advanced-toggle" id="advanced-toggle">▸ Server URL</button>
  <div id="advanced">
    <label for="serverUrl">Server URL</label>
    <input id="serverUrl" type="url" placeholder="http://localhost:8080" />
  </div>

  <p id="msg"></p>
</div>

<!-- Connecting view -->
<div id="view-connecting">
  <div class="spinner"></div>
  <span style="color: var(--subtle); font-size: 12px;">Waiting for login…</span>
  <button class="btn-logout" id="btn-cancel">Cancel</button>
</div>

<!-- Connected view -->
<div id="view-connected">
  <div class="user-row">
    <div class="avatar"><img id="user-avatar" src="" alt="" /></div>
    <div class="user-info">
      <div class="user-name" id="user-name">—</div>
      <div class="user-email" id="user-email">—</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot connected"></div>
    <span>Connected to Havril</span>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-value" id="stat-memories">—</span>
      <span class="stat-label">Memories</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-models">3</span>
      <span class="stat-label">Platforms</span>
    </div>
  </div>

  <div class="platforms">
    <div class="platform"><span class="platform-name">Claude.ai</span><span class="badge badge-active">active</span></div>
    <div class="platform"><span class="platform-name">ChatGPT</span><span class="badge badge-active">active</span></div>
    <div class="platform"><span class="platform-name">Gemini</span><span class="badge badge-active">active</span></div>
  </div>

  <button class="btn-logout" id="btn-logout">Sign out</button>
</div>

<script src="popup.js"></script>
</body>
</html>
